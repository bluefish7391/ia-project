<ul class="students__list">
  @for (student of students; track student.id) {
    <li class="students__list-item">
      <div class="students__list-details">
        <span class="students__list-id">#{{ student.schoolStudentID }}</span>
        <span class="students__list-name">{{ student.firstName }} {{ student.lastName }}</span>
      </div>
      <div class="students__list-actions">
        <button
          type="button"
          class="students__list-action"
          [disabled]="isSubmitting"
          (click)="update.emit(student)"
        >
          Edit
        </button>
        <button
          type="button"
          class="students__list-action students__list-action--danger"
          [disabled]="isSubmitting"
          (click)="delete.emit(student)"
        >
          Delete
        </button>
      </div>
    </li>
  }
</ul>
