<form class="organizations__form" (ngSubmit)="submitOrganization()">
  <div class="organizations__form-field">
    <label for="organizationName">Organization Name</label>
    <input
      id="organizationName"
      name="organizationName"
      [(ngModel)]="organizationName"
      [disabled]="isSubmitting"
      required
    />
  </div>

  <div class="organizations__form-field">
    <label for="organizationDescription">Description</label>
    <textarea
      id="organizationDescription"
      name="organizationDescription"
      rows="3"
      [(ngModel)]="organizationDescription"
      [disabled]="isSubmitting"
    ></textarea>
  </div>

  @if (mode === 'add') {
    <div class="organizations__form-field">
      <label for="parentOrganization">Parent Organization</label>
      <select
        id="parentOrganization"
        name="parentOrganization"
        [(ngModel)]="selectedParentId"
        [disabled]="isSubmitting"
      >
        <option value="">None (root organization)</option>
        @for (parent of availableParents; track parent.id) {
          <option [value]="parent.id">{{ parent.name }}</option>
        }
      </select>
    </div>
  } @else {
    <div class="organizations__form-field">
      <span class="organizations__form-label">Parent Organization</span>
      <span class="organizations__form-static">{{ parentOrganizationName }}</span>
    </div>
  }

  <div class="organizations__actions organizations__form-actions">
    <button
      type="submit"
      class="organizations__primary-action"
      [disabled]="isSubmitting"
    >
      {{ mode === 'add' ? 'Save Organization' : 'Save Changes' }}
    </button>
    <button
      type="button"
      class="organizations__secondary-action"
      [disabled]="isSubmitting"
      (click)="cancelEdit()"
    >
      Cancel
    </button>
  </div>
</form>
