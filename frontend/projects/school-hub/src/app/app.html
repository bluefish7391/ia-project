<mat-sidenav-container class="app-container">
	<mat-sidenav mode="over" [opened]="sidenavService.open()" (closedStart)="sidenavService.close()">
		<app-sidebar />
	</mat-sidenav>
	<mat-sidenav-content>
		<div class="app-content">
			<app-util-bar />
			<div class="main-router-container">
				<router-outlet />
			</div>	
		</div>
	</mat-sidenav-content>
</mat-sidenav-container>
