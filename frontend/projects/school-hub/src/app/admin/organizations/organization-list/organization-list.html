<ul class="organizations__list">
  @for (node of treeNodes; track node.organization.id) {
    <li>
      <app-organization-tree-node
        [node]="node"
        [isSubmitting]="isSubmitting"
        [depth]="0"
        (update)="update.emit($event)"
        (delete)="delete.emit($event)"
        (addSubOrg)="addSubOrg.emit($event)"
      />
    </li>
  }
</ul>
