<div mat-dialog-title class="dialog-header">
	<div class="header-text">
		<span class="header-label">Student</span>
	</div>
	<button mat-icon-button mat-dialog-close aria-label="Close dialog">
		<mat-icon>close</mat-icon>
	</button>
</div>

<mat-dialog-content class="dialog-content">
	<p class="prompt-text">What's your favorite animal?</p>
	<mat-form-field appearance="outline" class="full-width">
		<mat-label>Favorite Animal</mat-label>
		<input matInput [(ngModel)]="animal" (keyup.enter)="onOkClick()" cdkFocusInitial/>
	</mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
	<button matButton mat-dialog-close>Cancel</button>
	<button mat-flat-button (click)="onOkClick()">Confirm</button>
</mat-dialog-actions>
