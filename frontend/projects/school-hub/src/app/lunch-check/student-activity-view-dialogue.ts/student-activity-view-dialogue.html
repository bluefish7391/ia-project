<div mat-dialog-title class="dialog-header">
	<div class="header-text">
		<span class="header-label">{{ headerText }}</span>
	</div>
</div>

<mat-dialog-content class="dialog-content">
	<section class="lca-history" aria-label="Today's clock activity">
		<h2 class="lca-history__header">Today's Activity</h2>
		@if (todayHistory.length === 0) {
		<p class="lca-history__empty">No activity recorded today.</p>
		} @else {
		<ul class="lca-history__list">
			@for (event of todayHistory; track event.time.getTime()) {
			<li class="lca-history__item lca-history__item--{{ event.type }}">
				@if (event.type === 'in') {
				<svg class="lca-history__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
					fill="currentColor" aria-hidden="true">
					<path
						d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z" />
				</svg>
				} @else {
				<svg class="lca-history__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
					fill="currentColor" aria-hidden="true">
					<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4 11H8v-2h8v2z" />
				</svg>
				}
				<span class="lca-history__time">{{ event.label }}</span>
				<span class="lca-history__type">{{ event.type === 'in' ? 'Clock in' : 'Clock out' }}</span>
			</li>
			}
		</ul>
		}
	</section>
</mat-dialog-content>

<mat-dialog-actions align="end">
	<button matButton mat-dialog-close>Close</button>
</mat-dialog-actions>
