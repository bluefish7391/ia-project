<section class="tenants">
	<header class="tenants__header">
		<div class="tenants__title-block">
			<h2 class="tenants__title">Tenants</h2>
			<p class="tenants__subtitle">Manage all tenants in the system.</p>
		</div>
		<button type="button" class="tenants__primary-action" [disabled]="isSubmitting()" (click)="addTenant()">Add Tenant</button>
	</header>

	@if (formMode(); as mode) {
		<app-tenant-form
			[mode]="mode"
			[isSubmitting]="isSubmitting()"
			[initialName]="formName()"
			[initialDescription]="formDescription()"
			(save)="saveTenant($event)"
			(cancel)="cancelTenantForm()"
		/>
	}

	@if (actionMessage(); as message) {
		<p class="tenants__message" role="status">{{ message }}</p>
	}

	@if (isLoading()) {
		<p class="tenants__state">Loading tenants...</p>
	} @else if (errorMessage(); as error) {
		<div class="tenants__error">
			<p>{{ error }}</p>
			<button type="button" class="tenants__secondary-action" (click)="loadTenants()">Retry</button>
		</div>
	} @else if (tenants().length === 0) {
		<p class="tenants__state">No tenants found.</p>
	} @else {
		<app-tenant-list
			[tenants]="tenants()"
			[isSubmitting]="isSubmitting()"
			(update)="updateTenant($event)"
			(delete)="deleteTenant($event)"
		/>
	}
</section>
